        // --- CONTEXT & STATE ---
        const AppContext = createContext();

        const defaultState = {
            user: { name: 'Student', bio: 'Passionate learner', avatar: '👨‍💻', joinDate: new Date().toISOString() },
            enrollments: {}, // { courseId: true }
            progress: {}, // { courseId: { completedLessons: [], lastWatchedLesson: null, lastAccessedAt: null } }
            activityLog: [] // { lessonId, courseId, completedAt }
        };

        const reducer = (state, action) => {
            let newState;
            switch (action.type) {
                case 'INIT_STATE':
                    newState = { ...state, ...action.payload };
                    break;
                case 'UPDATE_USER':
                    newState = { ...state, user: { ...state.user, ...action.payload } };
                    break;
                case 'ENROLL_COURSE':
                    if (state.enrollments[action.payload]) return state;
                    newState = {
                        ...state,
                        enrollments: { ...state.enrollments, [action.payload]: true },
                        progress: {
                            ...state.progress,
                            [action.payload]: { completedLessons: [], lastWatchedLesson: null, lastAccessedAt: new Date().toISOString() }
                        }
                    };
                    break;
                case 'MARK_LESSON_COMPLETE': {
                    const { courseId, lessonId } = action.payload;
                    const courseProgress = state.progress[courseId] || { completedLessons: [] };
                    if (courseProgress.completedLessons.includes(lessonId)) return state;
                    
                    const updatedLessons = [...courseProgress.completedLessons, lessonId];
                    newState = {
                        ...state,
                        progress: {
                            ...state.progress,
                            [courseId]: { ...courseProgress, completedLessons: updatedLessons, lastWatchedLesson: lessonId, lastAccessedAt: new Date().toISOString() }
                        },
                        activityLog: [{ lessonId, courseId, completedAt: new Date().toISOString() }, ...state.activityLog].slice(0, 50)
                    };
                    break;
                }
                case 'SET_LAST_WATCHED': {
                    const { courseId, lessonId } = action.payload;
                    newState = {
                        ...state,
                        progress: {
                            ...state.progress,
                            [courseId]: { ...state.progress[courseId], lastWatchedLesson: lessonId, lastAccessedAt: new Date().toISOString() }
                        }
                    };
                    break;
                }
                case 'RESET_PROGRESS':
                    newState = defaultState;
                    break;
                default:
                    return state;
            }
            localStorage.setItem('lms_state', JSON.stringify(newState));
            return newState;
        };

        const AppProvider = ({ children, currentUser }) => {
            const [state, dispatch] = useReducer(reducer, defaultState);

            useEffect(() => {
                const saved = localStorage.getItem('lms_state');
                if (saved) {
                    try {
                        dispatch({ type: 'INIT_STATE', payload: JSON.parse(saved) });
                    } catch (e) {
                        console.error('Failed to parse local storage state');
                    }
                }
            }, []);

            useEffect(() => {
                if (currentUser) {
                    dispatch({ type: 'UPDATE_USER', payload: { name: currentUser.name, bio: currentUser.bio, avatar: currentUser.avatar } });
                }
            }, [currentUser]);

            return (
                <AppContext.Provider value={{ state, dispatch }}>
                    {children}
                </AppContext.Provider>
            );
        };

        const Badge = ({ children, color = 'primary' }) => {

        const ProgressBar = ({ progress, className = '', height='h-2.5' }) => (

        const Modal = ({ isOpen, onClose, onConfirm, title, message, confirmText = 'Confirm', confirmColor = 'red' }) => {
            if (!isOpen) return null;
            const colors = {
                red: 'bg-red-50 text-red-600 hover:bg-red-100 border border-red-200',
                primary: 'bg-primary text-white hover:bg-indigo-600 border border-transparent shadow-[0_4px_14px_0_rgba(99,91,255,0.39)]',
                success: 'bg-success/10 text-success hover:bg-success/20 border border-success/20'

            return (

                        <p className="text-body mb-8">{message}</p>

                            <button onClick={() => { onConfirm(); onClose(); }} className={`px-5 py-2.5 rounded-xl font-semibold transition-all ${colors[confirmColor]}`}>{confirmText}</button>
                        </div>
                    </div>
                </div>
            );
        };

            const colorId = parseInt(course.id.replace('c', ''), 10) || 1;

            const isCompleted = progress >= 100;

            return (
                <div 
                    onClick={onClick}
                    className="bg-white border border-slate-200 rounded-xl overflow-hidden cursor-pointer group hover:shadow-md transition-all h-full flex flex-col justify-between"
                >
                    <div className={`absolute top-0 left-0 right-0 h-1.5 ${topColor}`}></div>

                            src={course.thumbnailUrl} 
                            alt={course.title}
                            className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"

                    </div>

                    <div className="p-5 flex flex-col flex-1 justify-between">
                        <div className="flex items-start justify-between mb-8 mt-2">
                        <div className="flex items-center gap-3 w-2/3">
                            <div className="w-10 h-10 rounded-full bg-slate-900 text-white flex items-center justify-center font-bold shrink-0 text-sm">
                                {course.title.charAt(0)}
                            </div>
                            <div className="min-w-0">
                                <h3 className="font-bold text-heading text-sm truncate group-hover:text-primary transition-colors">{course.title}</h3>
                                <p className="text-xs text-slate-500 truncate mt-0.5">Mentor: {course.instructor}</p>
                            </div>

                            </div>
                        </div>

                        <div className="space-y-6">
                            <h2 className="text-2xl font-heading font-black text-heading flex items-center gap-3">
                                <span className="bg-red-50 text-red-500 p-2.5 rounded-xl"><IconAward /></span> Danger Zone
                            </h2>
                            <div className="bg-surface rounded-[2rem] border border-red-100 p-8 md:p-10 shadow-sm relative overflow-hidden">
                                <div className="absolute -top-10 -right-10 w-40 h-40 bg-red-50 blur-3xl rounded-full"></div>
                                <h3 className="text-xl font-black text-heading mb-3 relative z-10">Reset Progress</h3>
                                <p className="text-body text-sm mb-8 relative z-10 leading-relaxed">
                                    This will permanently delete your profile data, enrolled courses, and all completion history. This action cannot be undone.
                                </p>
                                <button 
                                    onClick={() => setShowResetModal(true)}
                                    className="w-full bg-white hover:bg-red-50 text-red-600 py-4 rounded-xl font-bold transition-colors border-2 border-red-100 hover:border-red-200 relative z-10"
                                >
                                    Reset All Data
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <Modal 
                        isOpen={showResetModal} 
                        onClose={() => setShowResetModal(false)}
                        onConfirm={() => {
                            dispatch({ type: 'RESET_PROGRESS' });
                            setView('dashboard');
                        }}
                        title="Reset Learning Progress?" 
                        message="Are you absolutely sure you want to reset your progress? You will lose all your enrolled courses, completed lessons, and profile settings."
                        confirmText="Yes, Reset"
                        confirmColor="red"
                    />
                </div>
            );
        };

        const TopNav = ({ currentView, setView, user, isMobileOpen, setIsMobileOpen, darkMode, setDarkMode, onLogout }) => {
            const navItems = [
                { id: 'dashboard', label: 'Home' },
                { id: 'catalog', label: 'Courses' }
            ];

            return (
                <header className={`border-b sticky top-0 z-50 shadow-sm ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                    <div className="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16">
                            {/* Logo */}
                            <div className="flex items-center gap-1 cursor-pointer" onClick={() => setView('dashboard')}>
                                <span className={`text-2xl font-heading font-black tracking-tight flex items-center ${darkMode ? 'text-slate-100' : 'text-heading'}`}>
                                    OneEight<span className="text-primary">.</span>
                                </span>
                            </div>

                            {/* Desktop Navigation */}
                            <nav className="hidden md:flex items-center space-x-8">
                                {navItems.map(item => {
                                    const isActive = currentView === item.id || (item.id === 'catalog' && currentView === 'courseDetail') || (item.id === 'dashboard' && currentView === 'player');
                                    return (
                                        <button
                                            key={item.id}
                                            onClick={() => setView(item.id)}
                                            className={`font-semibold text-sm py-5 border-b-2 transition-colors duration-300 ${isActive ? `text-heading border-primary ${darkMode ? 'text-slate-100' : ''}` : `border-transparent hover:text-heading ${darkMode ? 'text-slate-300 hover:text-slate-100' : 'text-slate-500'}`}`}
                                        >
                                            {item.label}
                                        </button>
                                    );
                                })}
                            </nav>

                            {/* Right Actions */}
                            <div className="flex items-center gap-4">
                                <button onClick={() => setDarkMode(!darkMode)} className={`w-8 h-8 rounded-full border items-center justify-center transition-colors hidden sm:flex ${darkMode ? 'border-slate-700 text-slate-300 hover:text-slate-100 hover:bg-slate-700' : 'border-slate-200 text-slate-500 hover:text-heading hover:bg-slate-50'}`}>
                                    {darkMode ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"/></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                                    )}
                                </button>
                                <div 
                                    onClick={() => setView('profile')}
                                    className={`w-8 h-8 rounded-full flex items-center justify-center cursor-pointer border transition-all text-sm hidden sm:flex ${darkMode ? 'bg-slate-700 border-slate-600 hover:ring-2 hover:ring-primary/50' : 'bg-slate-200 border-slate-300 hover:ring-2 hover:ring-primary/50'}`}
                                    title="View Profile"
                                >
                                    {user.avatar}
                                </div>
                                <button onClick={onLogout} className={`hidden sm:flex px-4 py-2 font-semibold text-sm rounded-full transition-all ${darkMode ? 'bg-red-900/20 text-red-400 hover:bg-red-900/40' : 'bg-red-50 text-red-600 hover:bg-red-100'}`}>
                                    Logout
                                </button>
                                <button onClick={() => setIsMobileOpen(!isMobileOpen)} className={`md:hidden p-2 ${darkMode ? 'text-slate-300' : 'text-slate-600'}`}>
                                    {isMobileOpen ? <IconX /> : <IconMenu />}
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const LoginRegisterView = ({ onLoginSuccess, darkMode }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);

                try {
                    if (isLogin) {
                        // MongoDB Login
                        if (!email || !password) {
                            setError('Please fill in all fields');
                            setLoading(false);
                            return;
                        }

                        const result = await authAPI.login(email, password);
                        
                        if (result.error) {
                            setError(result.error);
                            setLoading(false);
                        } else {
                            // Save token to localStorage
                            localStorage.setItem('authToken', result.token);
                            onLoginSuccess(result.user);
                        }
                    } else {
                        // MongoDB Registration
                        if (!email || !password || !name || !confirmPassword) {
                            setError('Please fill in all fields');
                            setLoading(false);
                            return;
                        }

                        if (password !== confirmPassword) {
                            setError('Passwords do not match');
                            setLoading(false);
                            return;
                        }

                        if (password.length < 6) {
                            setError('Password must be at least 6 characters');
                            setLoading(false);
                            return;
                        }

                        const result = await authAPI.register(name, email, password, confirmPassword);
                        
                        if (result.error) {
                            setError(result.error);
                            setLoading(false);
                        } else {
                            // Save token to localStorage
                            localStorage.setItem('authToken', result.token);
                            onLoginSuccess(result.user);
                        }
                    }
                } catch (err) {
                    setError('Network error. Make sure backend server is running on http://localhost:5000');
                    setLoading(false);
                }
            };

            return (
                <div className={`min-h-screen flex items-center justify-center p-4 ${darkMode ? 'bg-slate-900' : 'bg-gradient-to-br from-slate-50 to-slate-100'}`}>
                    <div className={`w-full max-w-md rounded-2xl shadow-2xl p-8 ${darkMode ? 'bg-slate-800' : 'bg-white'}`}>
                        {/* Logo */}
                        <div className="text-center mb-8">
                            <h1 className={`text-3xl font-heading font-black tracking-tight flex items-center justify-center gap-1 ${darkMode ? 'text-slate-100' : 'text-heading'}`}>
                                OneEight<span className="text-primary">.</span>
                            </h1>
                            <p className={`text-sm mt-2 ${darkMode ? 'text-slate-400' : 'text-slate-500'}`}>
                                {isLogin ? 'Welcome Back' : 'Join Our Community'}
                            </p>
                        </div>

                        {/* Form */}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {!isLogin && (
                                <div>
                                    <label className={`block text-sm font-semibold mb-2 ${darkMode ? 'text-slate-300' : 'text-heading'}`}>Full Name</label>
                                    <input
                                        type="text"
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                        placeholder="John Doe"
                                        className={`w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-primary/50 transition ${darkMode ? 'bg-slate-700 border-slate-600 text-slate-100' : 'bg-slate-50 border-slate-200'}`}
                                    />
                                </div>
                            )}

                            <div>
                                <label className={`block text-sm font-semibold mb-2 ${darkMode ? 'text-slate-300' : 'text-heading'}`}>Email Address</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    placeholder="you@example.com"
                                    className={`w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-primary/50 transition ${darkMode ? 'bg-slate-700 border-slate-600 text-slate-100' : 'bg-slate-50 border-slate-200'}`}
                                />
                            </div>

                            <div>
                                <label className={`block text-sm font-semibold mb-2 ${darkMode ? 'text-slate-300' : 'text-heading'}`}>Password</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="Enter your password"
                                    className={`w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-primary/50 transition ${darkMode ? 'bg-slate-700 border-slate-600 text-slate-100' : 'bg-slate-50 border-slate-200'}`}
                                />
                            </div>

                            {!isLogin && (
                                <div>
                                    <label className={`block text-sm font-semibold mb-2 ${darkMode ? 'text-slate-300' : 'text-heading'}`}>Confirm Password</label>
                                    <input
                                        type="password"
                                        value={confirmPassword}
                                        onChange={(e) => setConfirmPassword(e.target.value)}
                                        placeholder="Confirm your password"
                                        className={`w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-primary/50 transition ${darkMode ? 'bg-slate-700 border-slate-600 text-slate-100' : 'bg-slate-50 border-slate-200'}`}
                                    />
                                </div>
                            )}

                            {error && (
                                <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
                                    {error}
                                </div>
                            )}

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-primary hover:bg-yellow-400 text-heading font-bold py-3 rounded-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                {loading ? 'Processing...' : (isLogin ? 'Sign In' : 'Create Account')}
                            </button>
                        </form>

                        {/* Toggle */}
                        <div className="mt-6 text-center">
                            <p className={`text-sm ${darkMode ? 'text-slate-400' : 'text-slate-600'}`}>
                                {isLogin ? "Don't have an account? " : 'Already have an account? '}
                                <button
                                    onClick={() => {
                                        setIsLogin(!isLogin);
                                        setError('');
                                        setEmail('');
                                        setPassword('');
                                        setName('');
                                        setConfirmPassword('');
                                    }}
                                    className="text-primary font-semibold hover:text-yellow-500 transition"
                                >
                                    {isLogin ? 'Sign Up' : 'Sign In'}
                                </button>
                            </p>
                        </div>

                        {/* Demo Credentials */}
                        <div className={`mt-6 p-4 rounded-lg text-xs ${darkMode ? 'bg-slate-700 text-slate-300' : 'bg-slate-100 text-slate-600'}`}>
                            <p className="font-semibold mb-2">Demo Credentials:</p>
                            <p>Email: demo@example.com</p>
                            <p>Password: demo123</p>
                        </div>
                    </div>
                </div>
            );
        };
        
        // --- MAIN APP ---
        const App = () => {
            const [view, setView] = useState('dashboard');
            const [selectedCourse, setSelectedCourse] = useState(null);
            const [selectedLesson, setSelectedLesson] = useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [darkMode, setDarkMode] = useState(false);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);

            useEffect(() => {
                // Check for JWT token in localStorage and verify it
                const token = localStorage.getItem('authToken');
                if (token) {
                    authAPI.verifyToken(token)
                        .then((result) => {
                            if (result.error) {
                                // Token is invalid, clear it
                                localStorage.removeItem('authToken');
                                setIsAuthenticated(false);
                                setCurrentUser(null);
                            } else {
                                // Token is valid, restore user session
                                setCurrentUser(result.user);
                                setIsAuthenticated(true);
                            }
                        })
                        .catch((error) => {
                            console.error('Error verifying token:', error);
                            localStorage.removeItem('authToken');
                            setIsAuthenticated(false);
                        });
                }
            }, []);

            const handleLoginSuccess = (user) => {
                setCurrentUser(user);
                setIsAuthenticated(true);
            };

            const handleLogout = () => {
                // Clear JWT token from localStorage
                localStorage.removeItem('authToken');
                setCurrentUser(null);
                setIsAuthenticated(false);
                setView('dashboard');
            };

            if (!isAuthenticated) {
                return <LoginRegisterView onLoginSuccess={handleLoginSuccess} darkMode={darkMode} />;
            }
            
            return (
                <AppProvider currentUser={currentUser}>
                    <AppContext.Consumer>
                        {({ state }) => (
                            <div className={`flex flex-col h-screen overflow-hidden selection:bg-primary/20 selection:text-heading relative ${darkMode ? 'bg-slate-900 text-slate-100' : 'bg-background'}`}>
                                <TopNav currentView={view} setView={setView} user={state.user} isMobileOpen={isMobileMenuOpen} setIsMobileOpen={setIsMobileMenuOpen} darkMode={darkMode} setDarkMode={setDarkMode} onLogout={handleLogout} />
                                
                                <main className={`flex-1 overflow-y-auto w-full custom-scrollbar relative ${darkMode ? 'bg-slate-900' : ''}`}>
                                    <div className="max-w-[1600px] mx-auto w-full">
                                        {/* Mobile Menu Dropdown */}
                                        {isMobileMenuOpen && (
                                            <div className={`md:hidden border-b absolute top-0 left-0 right-0 z-40 p-4 shadow-lg animate-in slide-in-from-top-4 ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                                                <div className="flex flex-col space-y-2">
                                                    {['dashboard', 'catalog', 'profile'].map(v => (
                                                        <button key={v} onClick={() => { setView(v); setIsMobileMenuOpen(false); }} className={`p-3 text-left font-semibold rounded-lg capitalize ${darkMode ? 'text-slate-200 hover:bg-slate-700' : 'text-heading hover:bg-slate-50'}`}>
                                                            {v === 'dashboard' ? 'Home' : v === 'catalog' ? 'Courses' : v}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        
                                        <div className={`p-4 md:p-8 lg:p-12 ${darkMode ? 'text-slate-100' : ''}`}>
                                            {view === 'dashboard' && <DashboardView setView={setView} setSelectedCourse={setSelectedCourse} />}
                                            {view === 'catalog' && <CatalogView setView={setView} setSelectedCourse={setSelectedCourse} />}
                                            {view === 'courseDetail' && <CourseDetailView courseId={selectedCourse} setView={setView} setSelectedCourse={setSelectedCourse} setSelectedLesson={setSelectedLesson} />}
                                            {view === 'player' && <PlayerView courseId={selectedCourse} lessonId={selectedLesson} setView={setView} setSelectedLesson={setSelectedLesson} />}
                                            {view === 'profile' && <ProfileView setView={setView} />}
                                            {view === 'chatbot' && <ChatBotView setView={setView} />}
                                        </div>
                                    </div>
                                </main>
                            </div>
                        )}
                    </AppContext.Consumer>
                </AppProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
